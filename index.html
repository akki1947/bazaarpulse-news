<!DOCTYPE html>
<html lang="en">

<head>
<meta name="version" content="2">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>BazaarPulse</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>BazaarPulse</h1>
<p>Market Intelligence Dashboard</p>
</header>

<section class="ticker">

<div class="card">
<h3>NIFTY 50</h3>
<p id="nifty">Loading...</p>
</div>

<div class="card">
<h3>BANK NIFTY</h3>
<p id="banknifty">Loading...</p>
</div>

</section>

<section>

<h2>Market News</h2>
<ul id="news"></ul>

</section>

<section>

<h2>Market Movers</h2>

<div class="ticker">

<div class="card">
<h3>Top Gainers</h3>
<ul id="gainers"></ul>
</div>

<div class="card">
<h3>Top Losers</h3>
<ul id="losers"></ul>
</div>

</div>

</section>

<script src="app.js"></script>

</body>
</html>
